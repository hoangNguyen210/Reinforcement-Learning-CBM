<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CapRL++ Video Caption Demo</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">CapRL++</p>
          <h1>Video Caption Demo</h1>
          <p class="lede">
            Dense, chronological video captions generated by CapRL-Video-4B.
          </p>
        </div>
        <div class="hero-actions" aria-label="Project links">
          <a class="repo-link" href="https://arxiv.org/abs/2606.09393" target="_blank" rel="noreferrer">
            Paper
          </a>
          <a class="repo-link repo-link-secondary" href="https://github.com/InternLM/CapRL" target="_blank" rel="noreferrer">
            GitHub
          </a>
        </div>
      </header>

      <section class="demo-layout" aria-label="CapRL++ demo viewer">
        <aside class="case-rail">
          <div class="rail-header">
            <span>Cases</span>
            <strong id="case-count">0</strong>
          </div>
          <div id="case-list" class="case-list"></div>
        </aside>

        <section class="viewer">
          <div class="video-panel">
            <video id="video" controls playsinline preload="metadata"></video>
          </div>
          <div class="viewer-meta">
            <div>
              <p class="eyebrow">Selected case</p>
              <h2 id="case-title">Loading...</h2>
              <p id="case-subtitle" class="case-subtitle"></p>
            </div>
            <button id="copy-caption" class="copy-button" type="button">Copy caption</button>
          </div>
        </section>

        <section class="caption-panel">
          <div class="caption-toolbar">
            <div>
              <p class="eyebrow">Generated caption</p>
              <h2>Chronological description</h2>
            </div>
            <label class="search-box">
              <span>Search</span>
              <input id="caption-search" type="search" placeholder="setting, crown, cat...">
            </label>
          </div>
          <article id="caption" class="caption"></article>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
